<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Auspice Fashions</title>

<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@300;400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter', sans-serif;
  background:#F8F5F0;
  color:#111;
  overflow-x:hidden;
}

/* ========================= */
/* HEADER (MATCHED) */
/* ========================= */

header{
  position:fixed;
  top:0;
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 80px;
  background:rgba(0,0,0,0.88);
  backdrop-filter:blur(12px);
  z-index:1000;
}

/* LOGO */
.header-logo{
  display:flex;
  align-items:center;
  padding:14px 18px;
  border-radius:18px;
  background:rgba(255,255,255,0.05);
  transition:0.5s ease;
}

.header-logo img{
  height:78px;
  filter:brightness(1.15);
  transition:0.5s ease;
}

.header-logo:hover{
  transform:scale(1.04);
  background:rgba(197,164,126,0.18);
  box-shadow:0 15px 40px rgba(197,164,126,0.25);
}

/* NAV */
nav{
  display:flex;
  gap:30px;
}

nav a{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  transition:0.3s;
}

nav a:link{ color:white; text-decoration:none; }
nav a:visited{ color:#E2C8AA; }
nav a:hover{ border-bottom:1px solid #C5A47E; opacity:0.7; }
nav a:active{ color:white; }

/* ========================= */
/* HERO */
/* ========================= */

.hero{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  color:white;

  background:
  linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
  url('https://images.pexels.com/photos/3184338/pexels-photo-3184338.jpeg');

  background-size:cover;
  background-position:center;
}

.hero h1{
  font-family:'Fraunces', serif;
  font-size:86px;
  font-weight:400;
}

/* ========================= */
/* ANIMATION */
/* ========================= */

.fade-in{
  opacity:0;
  transform:translateY(40px);
  transition:all 1.1s ease;
}

.fade-in.visible{
  opacity:1;
  transform:translateY(0);
}

/* ========================= */
/* SECTION */
/* ========================= */

.section{
  padding:140px 90px;
  max-width:1000px;
  margin:auto;
}

/* CARD */
.card{
  background:white;
  padding:60px;
  border-radius:14px;
  box-shadow:0 20px 50px rgba(0,0,0,0.08);
}

/* FORM */
input, textarea{
  width:100%;
  padding:14px;
  margin-bottom:15px;
  border:1px solid #e5e5e5;
  font-family:'Inter', sans-serif;
  font-size:14px;
}

textarea{
  resize:none;
}

button{
  padding:12px 25px;
  background:#0B0B0B;
  color:white;
  border:none;
  cursor:pointer;
  letter-spacing:2px;
  text-transform:uppercase;
  transition:0.3s;
}

button:hover{
  opacity:0.85;
}

/* INFO */
.info{
  margin-top:40px;
  font-size:14px;
  color:#555;
  line-height:1.9;
}

.info strong{
  color:#111;
}

.address{
  margin-top:15px;
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
  background:#000;
  color:#fff;
  text-align:center;
  padding:90px 20px;
}

footer h3{
  font-family:'Fraunces', serif;
  font-weight:400;
  margin-bottom:10px;
}

footer p{
  opacity:0.8;
  font-size:13px;
  margin:6px 0;
  letter-spacing:1px;
}

.socials{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:20px;
}

.socials img{
  width:22px;
  filter:invert(1);
  opacity:0.75;
  transition:0.3s;
}

.socials img:hover{
  opacity:1;
  transform:scale(1.1);
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:900px){

  header{
    padding:18px 25px;
  }

  .hero h1{
    font-size:48px;
  }

  .section{
    padding:100px 25px;
  }

  .card{
    padding:30px;
  }

  .header-logo img{
    height:56px;
  }
}

</style>
</head>

<body>

<!-- HEADER -->
<header>

  <div class="header-logo">
    <img src="Auspice Fashions Logo.png" alt="Auspice Fashions Logo">
  </div>

  <nav>
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </nav>

</header>

<!-- HERO -->
<section class="hero fade-in">
  <h1>Contact</h1>
</section>

<!-- CONTACT SECTION -->
<section class="section fade-in">

<div class="card">

  <input type="text" placeholder="Full Name">
  <input type="email" placeholder="Email Address">
  <textarea rows="6" placeholder="Your Message"></textarea>

  <button>Send Message</button>

  <!-- INFO -->
  <div class="info">

    <p><strong>Phone:</strong> +256703785016</p>
    <p><strong>Email:</strong> nlucille@gmail.com</p>

    <div class="address">
      <p><strong>Address:</strong><br>
      Plot 3, Kiyimba Close,<br>
      Kati, Mukono,<br>
      Uganda
      </p>
    </div>

  </div>

</div>

</section>

<!-- FOOTER -->
<footer class="fade-in">

  <h3>Auspice Fashions</h3>

  <div class="socials">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733558.png" alt="Instagram">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733547.png" alt="Facebook">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733579.png" alt="Twitter">
  </div>

  <p style="margin-top:20px;">
    +256703785016 | nlucille@gmail.com
  </p>

</footer>

<script>
const elements = document.querySelectorAll('.fade-in');

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
    }
  });
},{threshold:0.15});

elements.forEach(el=>observer.observe(el));
</script>

</body>
</html>
